{% extends 'base.html' %}
{% block title %}Login - BookAI{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4">
                <h3 class="fw-bold text-center mb-4"
                    style="color:#1a1a2e;">
                    Welcome Back 📚
                </h3>
                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            Email Address
                        </label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter your email"
                               required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">
                            Password
                        </label>
                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter your password"
                               required>
                    </div>
                    <button type="submit"
                            class="btn w-100 py-2 fw-bold"
                            style="background:#6C63FF;
                                   color:white;">
                        Login
                    </button>
                </form>
                <p class="text-center mt-3 text-muted">
                    Don't have an account?
                    <a href="/register"
                       style="color:#6C63FF;">
                        Register here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
